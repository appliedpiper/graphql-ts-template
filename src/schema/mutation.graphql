"SeedDatabase Input to specify the number of users and orders to generate"
input SeedInput {
  userCount: Int
  orderCount: Int
}

"Returned Result from inserting Seed Data"
type SeedResult {
  usersInserted: Int!
  ordersInserted: Int!
}

input AddUserInput {
  firstName: String!
  lastName: String!
  email: Email!
}

type Mutation {
  "Mutation to add Seed Data to DB"
  seedDatabase(input: SeedInput = {}): SeedResult!

  "Mutation to add a new user to the DB"
  addUser(input: AddUserInput!): User!
}